spring.application.name=task-queue-engine
# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/taskqueue_db
spring.datasource.username=taskqueue_user
spring.datasource.password=taskqueue_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — validate means Hibernate checks schema matches entities, but doesn't modify it
# Flyway handles all schema changes, so we never let Hibernate auto-create/update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — enabled by default when on classpath, points to db/migration
spring.flyway.enabled=true